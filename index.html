function buildAvailability(seed = 7) {
  const start = new Date(2026, 5, 19); // today
  const days = [];
  const rng = (n) => { let x = (seed*(n+1)*9301+49297)%233280; return x/233280; };
  for (let i = 0; i < 14; i++) {
    const d = new Date(start); d.setDate(start.getDate()+i);
    const isWeekend = d.getDay()===0||d.getDay()===6;
    days.push({ date: d, slots: [
      { time:'7:30 AM',  free: rng(i)     > (isWeekend?.7:.35) },
      { time:'10:00 AM', free: rng(i+50)  > (isWeekend?.8:.45) },
      { time:'1:30 PM',  free: rng(i+100) > (isWeekend?.6:.5)  },
    ]});
  }
  return days;
}
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── Animated hero gallery ──
function HeroGallery() {
  const slides = [
    { src:TSL.photos.lawn_wide, tag:'Ridgeway Ln.',    season:'Green' },
    { src:TSL.photos.mowing,    tag:'St. Joseph bluff',season:'Green' },
    { src:TSL.photos.landscape, tag:'Pipestone beds',  season:'Green' },
    { src:TSL.photos.driveway,  tag:'Dec. 14th storm', season:'White' },
    { src:TSL.photos.plow,      tag:'Pre-dawn route',  season:'White' },
    { src:TSL.photos.hedges,    tag:'Napier Ave.',     season:'Green' },
  ];
  const [idx, setIdx] = React.useState(0);
  const [paused, setPaused] = React.useState(false);
  React.useEffect(() => {
    if (paused) return;
    const id = setInterval(() => setIdx(i => (i+1) % slides.length), 4200);
    return () => clearInterval(id);
  }, [paused]);
  return (
    <div onMouseEnter={()=>setPaused(true)} onMouseLeave={()=>setPaused(false)}
      style={{ position:'relative', width:'100%', height:520, overflow:'hidden', borderRadius:2, background:B.ice }}>
      {slides.map((s,i) => (
        <img key={i} src={s.src} alt="" loading={i<2?'eager':'lazy'} style={{
          position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover',
          opacity: i===idx ? 1 : 0, transition:'opacity 1.2s ease-in-out',
          animation: i===idx ? 'kBurns 5s ease-out both' : 'none',
        }}/>
      ))}
      <div style={{ position:'absolute', top:20, left:20, display:'inline-flex', gap:8, alignItems:'center',
                    background:'rgba(18,56,79,.85)', color:B.birch, padding:'7px 13px', borderRadius:20,
                    fontSize:11.5, letterSpacing:'0.12em', textTransform:'uppercase', fontWeight:600,
                    backdropFilter:'blur(6px)' }}>
        <span style={{color: slides[idx].season==='Green' ? '#8ec29a' : '#bfdbea'}}>
          {slides[idx].season==='Green' ? '●' : '❄'}
        </span>
        {slides[idx].tag}
      </div>
      <div style={{ position:'absolute', bottom:20, left:20, right:20, display:'flex', gap:6 }}>
        {slides.map((_,i) => (
          <button key={i} onClick={()=>setIdx(i)}
            style={{ flex:1, height:3, padding:0, background:'rgba(255,255,255,.35)', border:'none', cursor:'pointer', position:'relative', overflow:'hidden' }}>
            <span style={{ position:'absolute', inset:0, background:B.wheat, transformOrigin:'left',
              transform:`scaleX(${i<idx?1:i===idx?1:0})`,
              animation: i===idx&&!paused ? 'lksProg 4.2s linear' : 'none',
            }}/>
          </button>
        ))}
      </div>
      <style>{`
        @keyframes kBurns { 0%{transform:scale(1.02) translate(0,0)} 100%{transform:scale(1.12) translate(-1.5%,-1%)} }
        @keyframes lksProg { from{transform:scaleX(0)} to{transform:scaleX(1)} }
      `}</style>
    </div>
  );
}

      <div style={{background:B.birch, border:`1px solid ${B.border}`, borderTop:'none'}}>

          <div key={di} style={{display:'grid', gridTemplateColumns:'150px repeat(3,1fr)', borderBottom: di<9 ? `1px solid ${B.border}` : 'none'}}>
            <div style={{padding:'16px', borderRight:`1px solid ${B.border}`, background: di===0?B.ice2:B.birch}}>

              <div style={{...D, fontSize:18, fontWeight:500, color:B.ink, marginTop:2}}>

                <button key={si} onClick={()=>slot.free&&onSel({dayIdx:di,slotIdx:si})} disabled={!slot.free} style={{
                  background: isSel ? B.lake : (slot.free ? B.birch : B.ice2),
                  color: isSel ? B.birch : (slot.free ? B.ink : B.muted),
                  border:'none', borderRight: si<2 ? `1px solid ${B.border}` : 'none',
                  padding:'16px', fontFamily:'inherit', fontSize:14, fontWeight:500,
                  cursor: slot.free ? 'pointer' : 'not-allowed',
                  textAlign:'left', display:'flex', alignItems:'center', gap:8,
                }}>
                  {slot.free ? (<>{isSel ? <ICheck s={15} color={B.birch} sw={2.5}/> : <IClock s={14} color={B.wheat2}/>} {isSel?'Selected':'Open'}</>) : (<><span style={{width:10,height:2,background:B.muted,borderRadius:1}}/> Booked</>)}
                </button>
              );
            })}
          </div>

// ── App shell ──
function App() {
  const [route, setRoute] = React.useState('home');
  const routerRef = React.useRef(null);
  React.useEffect(() => {
    if (routerRef.current) routerRef.current.scrollTop = 0;
  }, [route]);
  return (
    <div ref={routerRef} data-site-root style={{ fontFamily:'"DM Sans",-apple-system,system-ui,sans-serif', color:B.ink, background:B.birch, minHeight:'100vh', lineHeight:1.55, fontSize:15 }}>
      <Header route={route} setRoute={setRoute}/>
      {route==='home'     && <Home setRoute={setRoute}/>}
      {route==='services' && <Services setRoute={setRoute}/>}
      {route==='book'     && <Book setRoute={setRoute}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
